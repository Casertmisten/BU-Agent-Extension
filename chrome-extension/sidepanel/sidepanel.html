<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Use Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    #mode-toggle {
      display: flex;
      gap: 4px;
    }

    #mode-toggle button {
      padding: 4px 10px;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    #mode-toggle button.active {
      background: #4a6cf7;
      color: white;
      border-color: #4a6cf7;
    }

    #status-bar {
      padding: 4px 16px;
      font-size: 11px;
      color: #666;
      border-bottom: 1px solid #2a2a4a;
    }

    #status-bar.connected { color: #4caf50; }
    #status-bar.disconnected { color: #f44336; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 90%;
      word-wrap: break-word;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #4a6cf7;
      color: white;
    }

    .message.agent {
      align-self: flex-start;
      background: #2a2a4a;
      color: #e0e0e0;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: #666;
      font-size: 11px;
    }

    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a4a;
    }

    #user-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #2a2a4a;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    #user-input:focus {
      border-color: #4a6cf7;
    }

    #send-btn {
      padding: 8px 16px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    #send-btn:hover {
      background: #3a5ce5;
    }

    #send-btn:disabled {
      background: #333;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🤖 Browser Agent</h1>
    <div id="mode-toggle">
      <button id="ai-mode-btn" class="active">AI</button>
      <button id="manual-mode-btn">Manual</button>
    </div>
  </div>

  <div id="status-bar" class="disconnected">● 未连接</div>

  <div id="chat-container">
    <div class="message system">Agent 就绪，输入任务开始。</div>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="输入任务..." autocomplete="off">
    <button id="send-btn">发送</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
