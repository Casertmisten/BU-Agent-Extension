logging:
  level: ${LOG_LEVEL:-DEBUG}

llm:
  provider: ${LLM_PROVIDER:-dashscope}
  model: ${LLM_MODEL:-glm-5.1}
  api_key: ${LLM_API_KEY}

vlm:
  provider: ${VLM_PROVIDER:-dashscope}
  model: ${VLM_MODEL:-qwen3.6-35b-a3b}
  api_key: ${VLM_API_KEY}

server:
  host: ${SERVER_HOST:-localhost}
  port: ${SERVER_PORT:-8765}
  heartbeat_interval: ${HEARTBEAT_INTERVAL:-30}

skills:
  dirs:
    - "./skills"

browser:
  dom_strategy: ${DOM_STRATEGY:-ax}   # "ax"=新版 AX 树解析, "flat"=旧版扁平列表
