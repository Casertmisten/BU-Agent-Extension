logging:
  level: ${LOG_LEVEL:-DEBUG}

llm:
  provider: ${LLM_PROVIDER:-dashscope}
  model: ${LLM_MODEL:-glm-5.1}
  api_key: ${LLM_API_KEY}
  base_url: ${LLM_BASE_URL:-}

vlm:
  provider: ${VLM_PROVIDER:-dashscope}
  model: ${VLM_MODEL:-qwen3.6-35b-a3b}
  api_key: ${VLM_API_KEY}
  base_url: ${VLM_BASE_URL:-}

server:
  host: ${SERVER_HOST:-localhost}
  port: ${SERVER_PORT:-8765}
  heartbeat_interval: ${HEARTBEAT_INTERVAL:-30}

skills:
  dirs:
    - "./skills"

browser:
  dom_strategy: ${DOM_STRATEGY:-ax}   # "ax"=AX 树, "flat"=扁平列表, "tree"=DOM 树剪枝脱水文本

recorder:
  # 蒸馏用的模型配置（不配则复用 llm 段）
  distill_model: null   # null 表示复用 llm.model
  # 单批上传事件数上限（前端聚合后批量发送）
  batch_size: 500
  # 内存缓冲落盘阈值（前端防内存膨胀）
  buffer_flush_threshold: 5000
